<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>텍스트 꾸미기</title>
        <style>
            #brown{
                background-color: #A52A2A;
            }
            #deepskyblue{
                background-color: #00BFFF;
            }
            #blueviolet{
                background-color: #8A2BE2;
            }
            #gold{
                background-color: #FFD700;
            }
            #darkorange{
                background-color: #FF8C00;
            }
            #olivedrab{
                background-color: #6B8E23;
            }

        </style>
        </head>
        <body>
            <h3>색 이름과 코드</h3>
            <br>
            <table border="1">
                <thead>
                    <tr><th>이름</th><th>코드</th><th>색</th><th>이름</th><th>코드</th><th>색</th></tr>
                </thead>
                <tbody>
                    <tr><td>brown</td><td>#A52A2A</td><td><div id=brown></div></td><td>DeepSkyBlue</td><td>#00BFFF</td><td><div id=deepskyblue></div></tr>
                    <tr><td>Blueviolet</td><td>#8A2BE2</td><td><div id=blueviolet></div></td><td>Gold</td><td>#FFD700</td><td><div id=gold></div></tr>
                    <tr><td>DarkOrange</td><td>#FF8C00</td><td><div id=darkorange></div></td><td>OliveDrab</td><td>#6B8E23</td><td><div id=olivedrab></div></tr>
                </tbody>
            </table>
</body>
</html>
