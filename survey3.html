<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>설문지</title>
    </head>
    <body>
        <header>
            <h1>설문지</h1>
            <p>소프트웨어 기술에 대한 의견을 듣습니다. 많은 참여 부탁드립니다.</p>
        </header>
        <hr>
        <section>
            <article id="grade">
                <label>
                    학년 <input type="radio" name="grade" value="1">
                    1학년
                    <input type="radio" name="grade" value="2">
                    2학년
                    <input type="radio" name="grade" value="3">
                    3학년
                </label>
            </article>

            <article id="gender">
                성별 <input type="radio" name="gender" value="1">
                남
                <input type="radio" name="gender" value="2">
                여
            </article>

            <article id="interest">
                관심분야 <select name="관심분야">
                    <option value="1">모바일 소프트웨어</option>
                    <option value="2">게임 개발</option>
                    <option value="3">웹 프로그래밍 개발자</option>
                </select>
            </article>

            <article id="course">
                진로 <input type="checkbox">
                개발
                <input type="checkbox">
                기획
                <input type="checkbox">
                영업
                <input type="checkbox">
                창업
            </article>

            <form>
            남기고 싶은 말
            <textarea rows="10" cols="50" placeholder="글을 남겨주세요."></textarea>
            </form><br>

        </section>

        <footer>
            Copyright 2026 by MYONGJI COLLEGE
        </footer>
    </body>
</html>
