<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>설문지</title>
        <style>
            h1 {
                color: brown;
                text-align: center;
            }
            body {
                background: aliceblue;
            }
            section {
                background: pink;
            }
            header {
                border-bottom: 1px solid black;
            }
            p {
                font-family: "휴먼편지체";
                font-size: 1em;
                text-indent: 1em;
            }
            footer {
                background: orange;
                border-radius: 10px;
            }
        </style>
    </head>
    <body>
        <header>
            <h1>설문지</h1>
            <p>소프트웨어 기술에 대한 의견을 듣습니다. 많은 참여 부탁드립니다.</p>
            <hr>
        </header>
        <section>
            <article id="grade">
                <label>
                    <p>학년 <input type="radio" name="grade" value="1">
                    1학년
                    <input type="radio" name="grade" value="2">
                    2학년
                    <input type="radio" name="grade" value="3">
                    3학년</p>
                </label>
            </article>

            <article id="gender">
                <p>성별 <input type="radio" name="gender" value="1">
                남
                <input type="radio" name="gender" value="2">
                여</p>
            </article>

            <article id="interest">
                <p>관심분야 <select name="관심분야">
                    <option value="1">모바일 소프트웨어</option>
                    <option value="2">게임 개발</option>
                    <option value="3">웹 프로그래밍 개발자</option>
                </select></p>
            </article>

            <article id="course">
                <p>진로 <input type="checkbox">
                개발
                <input type="checkbox">
                기획
                <input type="checkbox">
                영업
                <input type="checkbox">
                창업</p>
            </article>

            <form>
            <p>남기고 싶은 말
            <textarea rows="10" cols="50" placeholder="글을 남겨주세요."></textarea></p>
            </form>
        </section>

        <footer>
            <p>Copyright 2026 by MYONGJI COLLEGE</p>
        </footer>
    </body>
</html>
